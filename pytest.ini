[pytest]
minversion = 7.0
addopts = -ra -q --tb=short
testpaths = tests
markers =
    unit: Fast unit tests (default)
    integration: Slow integration tests requiring external services
    heavy: Resource-intensive or long-running tests
    slow: Tests that take >30s
    api: API endpoint tests
    blockchain: Tests requiring blockchain connectivity
    telegram: Tests requiring Telegram bot token
    signal: Signal generation tests
    arbitrage: Arbitrage strategy tests
    mcp: MCP service tests
    blender: Blender MCP tests (requires Blender binary)
    remix: Remix Opus connector tests
    security: Security and audit tests
    performance: Performance benchmarks
    fuzz: Fuzzing tests
    e2e: End-to-end tests
    ci_only: Tests that should only run in CI
    local_only: Tests that should only run locally
filterwarnings =
    ignore::DeprecationWarning:web3.*
    ignore::DeprecationWarning:eth_abi.*
    ignore::UserWarning:pandas.*
    ignore::RuntimeWarning:numpy.*
